name: Build and Push Container
run-name: "Build and Push ghcr.io/${{ github.repository }}"

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create Image Tag
        id: image_tag
        shell: bash
        run: |
          img_tag=$(echo "${GITHUB_SHA::10}")
          echo "img_tag=${img_tag}" >> "$GITHUB_OUTPUT"
          docker_image_url="ghcr.io/${REPOSITORY}:${img_tag}"
          echo "docker_image_url=${docker_image_url}" >> "$GITHUB_OUTPUT"
          echo "docker_image_url=${docker_image_url}" >> "$GITHUB_STEP_SUMMARY"
        env:
          REPOSITORY: ${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ steps.image_tag.outputs.img_tag }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image_tag.outputs.docker_image_url }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
